name: ThoiTietBonMua
version: 2.1
main: me.tuicode.thoitietbonmua.ThoiTietBonMua
api-version: '1.21'
author: Xnos
description: "Hệ thống thời tiết bốn mùa v2.1 cho Paper 1.21 - SMP 10A1"

permissions:
  thoitiet.player:
    description: "Quyền xem thông tin mùa (/season info)"
    default: true
  thoitiet.admin:
    description: "Quyền ép mùa bằng /season set và /season reset"
    default: op

commands:
  season:
    description: "Quản lý hệ thống thời tiết bốn mùa"
    permission: thoitiet.player
    usage: "/season <info|set <xuan|ha|thu|dong>|reset>"
